name: CI

on:
  push:
    branches:
      - '**'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up UV
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.1

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.12']
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up UV
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Run tests with coverage
        run: pytest

  test-gnn:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up UV
        uses: astral-sh/setup-uv@v4

      - name: Install deps (incl TensorFlow)
        run: |
          uv pip install -r requirements.txt --system
          uv pip install -r app/requirements.txt --system

      # Scoped to the GNN test files, which are self-contained and CI-portable:
      # weight-dependent tests skip (not fail) when the git-ignored model
      # artifacts are absent. Running the full suite here would pull in existing
      # tests that require the (also git-ignored) MLP model file. Provision the
      # model artifacts in CI to activate the skipped weight/parity tests.
      - name: Run GNN/TF tests
        run: >-
          pytest
          app/sa/core/tests/test_gnn_graph.py
          app/sa/core/tests/test_gnn_serving.py
          app/sa/core/tests/test_gnn_parity.py
          app/sa/core/tests/test_feature_contract.py
          app/sa/core/tests/test_gnn_killswitch.py
